<div class="login-container">
  <mat-progress-bar *ngIf="isLoading$ | async" color="accent" mode="indeterminate" class="login-loading-bar"></mat-progress-bar>
  <div *ngIf="isLoading$ | async" class="login-loading-overlay" aria-hidden="true"></div>
  <div class="logo-placeholder">
    <img src="assets/logo.jpg" alt="Logo" />
    <mat-icon style="font-size:3rem;">account_circle</mat-icon>
  </div>
  <h1 class="app-title">Plataforma Soft Skills</h1>
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <h2>Iniciar sesion</h2>
    <div>
      <label for="username">Usuario:</label>
      <input id="username" type="text" formControlName="username" required [disabled]="isLoading$ | async" />
      <div *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched" class="error">
        Usuario requerido
      </div>
    </div>
    <div>
      <label for="password">Contrasena:</label>
      <div class="password-input-container">
        <input id="password"
               [type]="showPassword ? 'text' : 'password'"
               formControlName="password"
               required
               [disabled]="isLoading$ | async" />
        <button type="button"
                mat-icon-button
                (click)="togglePasswordVisibility()"
                class="password-toggle-button"
                [disabled]="isLoading$ | async">
          <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>
      <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error">
        Contrasena requerida
      </div>
    </div>
    <button type="submit" [disabled]="loginForm.invalid || (isLoading$ | async)">{{ (isLoading$ | async) ? 'Entrando...' : 'Entrar' }}</button>
    <p *ngIf="isLoading$ | async" class="loading-message">Validando credenciales y preparando tu acceso...</p>
    <div *ngIf="loginError" class="error">{{ loginError }}</div>
  </form>
</div>
