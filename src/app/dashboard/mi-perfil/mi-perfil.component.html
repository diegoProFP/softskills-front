<div *ngIf="user as u; else noUser">
  <h2>Mi Perfil</h2>
  <div class="perfil-container">
    <img *ngIf="u.userPictureUrl" [src]="u.userPictureUrl" alt="Avatar" class="avatar" />
    <ul>
      <li><strong>Nombre completo:</strong> {{ u.fullname }}</li>
      <li><strong>Nombre de usuario:</strong> {{ u.username }}</li>
      <li *ngIf="u.lang"><strong>Idioma:</strong> {{ u.lang }}</li>
      <li *ngIf="u.sitename"><strong>Sitio:</strong> {{ u.sitename }}</li>
      <li *ngIf="u.siteurl"><strong>URL del sitio:</strong> {{ u.siteurl }}</li>
      <li><strong>Roles:</strong> {{ roles.join(', ') }}</li>
      <li><strong>Usuario ID:</strong> {{ u.userid }}</li>
    </ul>
  </div>
</div>
<ng-template #noUser>
  <p>No hay informacion de usuario disponible.</p>
</ng-template>
