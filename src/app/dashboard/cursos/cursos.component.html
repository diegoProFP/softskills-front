<div class="cursos-grid">
  <h2>Cursos</h2>
  <mat-progress-bar *ngIf="loading" color="accent" mode="indeterminate"></mat-progress-bar>
  <div *ngIf="!loading && cursos.length === 0" class="no-cursos">
    No hay cursos asociados al usuario.
  </div>
  <div *ngIf="!loading && cursos.length > 0" class="search-row">
    <mat-form-field appearance="outline" class="course-search">
      <mat-label>Buscar curso</mat-label>
      <mat-icon matPrefix>search</mat-icon>
      <input
        type="text"
        matInput
        [formControl]="busquedaControl"
        [matAutocomplete]="autoCursos"
        placeholder="Teclea nombre o codigo">
      <button
        *ngIf="busquedaControl.value"
        type="button"
        mat-icon-button
        matSuffix
        aria-label="Limpiar busqueda"
        (click)="limpiarBusqueda()">
        <mat-icon>close</mat-icon>
      </button>
      <mat-autocomplete #autoCursos="matAutocomplete">
        <mat-option *ngFor="let curso of opcionesAutocompletado" [value]="curso.nombreCorto">
          <span>{{ curso.nombreCorto }}</span>
          <small>{{ curso.nombreLargo }}</small>
        </mat-option>
      </mat-autocomplete>
    </mat-form-field>
  </div>
  <div *ngIf="!loading && cursos.length > 0 && (cursosRegistradosFiltrados.length > 0 || cursosNoRegistradosFiltrados.length > 0)" class="card-list">
    <div *ngIf="cursosRegistradosFiltrados.length > 0">
      <h3>Cursos Registrados</h3>
      <mat-card class="curso-card" *ngFor="let curso of cursosRegistradosFiltrados" [routerLink]="['/dashboard/cursos', curso.id]" style="cursor:pointer">
        <mat-card-title>{{ curso.nombreCorto }}</mat-card-title>
        <mat-card-content>{{ curso.nombreLargo }}</mat-card-content>
      </mat-card>
    </div>
    <div *ngIf="cursosNoRegistradosFiltrados.length > 0">
      <h3>Cursos No Registrados</h3>
      <mat-card class="curso-card" *ngFor="let curso of cursosNoRegistradosFiltrados">
        <mat-card-title>{{ curso.nombreCorto }}</mat-card-title>
        <mat-card-content>{{ curso.nombreLargo }}</mat-card-content>
        <mat-card-actions>
          <button mat-raised-button color="primary" (click)="registrarCurso(curso.id)">Registrar Curso</button>
        </mat-card-actions>
      </mat-card>
    </div>
  </div>
  <div *ngIf="!loading && cursos.length > 0 && cursosRegistradosFiltrados.length === 0 && cursosNoRegistradosFiltrados.length === 0" class="no-cursos">
    No hay cursos que coincidan con la busqueda.
  </div>
</div>
